<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Latinoamericana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        @keyframes float {
            0%   { transform: translateY(0px); }
            50%  { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-animation { animation: float 3s ease-in-out infinite; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.5s ease-out both; }
        .fade-up-2 { animation: fadeUp 0.5s ease-out 0.1s both; }
        .fade-up-3 { animation: fadeUp 0.5s ease-out 0.2s both; }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-white to-orange-50 min-h-screen flex flex-col font-sans">

    <!-- HEADER -->
    <header class="p-6 flex justify-between items-center container mx-auto">
        <div class="flex items-center space-x-2">
            <div class="bg-amber-600 p-2 rounded-lg text-white">
                <i data-lucide="brain-circuit" class="h-6 w-6"></i>
            </div>
            <span class="text-xl font-black tracking-tighter uppercase text-slate-800">Puntico</span>
        </div>
        <div id="user-nav" class="flex items-center gap-3"></div>
    </header>

    <!-- HERO — JUEGO -->
    <main class="flex-1 container mx-auto px-6 flex flex-col items-center justify-center text-center pt-8 pb-4">

        <div class="mb-12">
            <span class="bg-amber-100 text-amber-700 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest mb-4 inline-block">Edición Coleccionable</span>
            <h1 class="text-5xl md:text-7xl font-black text-slate-900 tracking-tighter leading-none mb-6">
                DESCUBRE TU <br><span class="text-amber-600">IDENTIDAD</span>
            </h1>
            <p class="text-slate-600 text-lg md:text-xl max-w-xl mx-auto font-medium">
                Un juego de memoria para aprender sobre los personajes y símbolos que nos hacen únicos.
            </p>
        </div>

        <!-- EDICIONES DEL JUEGO -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl px-4">

            <button onclick="play('panama')" id="btn-panama" class="group relative bg-white p-10 rounded-[3rem] shadow-xl hover:shadow-amber-200 transition-all border-2 border-transparent hover:border-amber-500 text-left overflow-hidden">
                <div class="relative z-10">
                    <span class="text-6xl mb-6 block float-animation">🇵🇦</span>
                    <h3 class="text-3xl font-black text-slate-900 uppercase">Panamá</h3>
                    <p class="text-slate-500 font-medium">12 Cartas Coleccionables</p>
                    <div class="mt-8 flex items-center text-amber-600 font-bold uppercase text-sm tracking-widest">
                        Explorar ahora <i data-lucide="arrow-right" class="ml-2 h-4 w-4 group-hover:translate-x-2 transition-transform"></i>
                    </div>
                </div>
                <div class="absolute -bottom-10 -right-10 text-slate-50 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i data-lucide="map" class="h-40 w-40"></i>
                </div>
            </button>

            <button onclick="play('venezuela')" id="btn-venezuela" class="group relative bg-white p-10 rounded-[3rem] shadow-xl hover:shadow-amber-200 transition-all border-2 border-transparent hover:border-amber-500 text-left overflow-hidden">
                <div class="relative z-10">
                    <span class="text-6xl mb-6 block float-animation" style="animation-delay:0.5s;">🇻🇪</span>
                    <h3 class="text-3xl font-black text-slate-900 uppercase">Venezuela</h3>
                    <p class="text-slate-500 font-medium">Próximamente más cartas</p>
                    <div class="mt-8 flex items-center text-amber-600 font-bold uppercase text-sm tracking-widest">
                        Explorar ahora <i data-lucide="arrow-right" class="ml-2 h-4 w-4 group-hover:translate-x-2 transition-transform"></i>
                    </div>
                </div>
                <div class="absolute -bottom-10 -right-10 text-slate-50 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i data-lucide="map" class="h-40 w-40"></i>
                </div>
            </button>

        </div>
    </main>

    <!-- ══════════════════════════════════════════════
         SECCIÓN TIENDA — productos dinámicos desde Supabase
    ══════════════════════════════════════════════ -->
    <section id="store-section" class="container mx-auto px-6 py-16 hidden">

        <!-- Separador visual -->
        <div class="flex items-center gap-4 mb-10">
            <div class="h-px flex-1 bg-gradient-to-r from-transparent to-amber-200"></div>
            <div class="text-center">
                <span class="bg-slate-900 text-white px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">Tienda oficial</span>
            </div>
            <div class="h-px flex-1 bg-gradient-to-l from-transparent to-amber-200"></div>
        </div>

        <div class="text-center mb-10">
            <h2 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter leading-none mb-3">
                LLÉVALO A <br><span class="text-amber-600">TU MESA</span>
            </h2>
            <p class="text-slate-500 font-medium max-w-md mx-auto">
                Versiones físicas para compartir, regalar y coleccionar.
            </p>
        </div>

        <!-- Grid de productos — se llena dinámicamente -->
        <div id="store-products-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto mb-10">
            <!-- Skeletons mientras carga -->
            <div class="h-72 rounded-[3rem] bg-white/60 animate-pulse border-2 border-white shadow-xl"></div>
            <div class="h-72 rounded-[3rem] bg-white/60 animate-pulse border-2 border-white shadow-xl" style="animation-delay:0.1s;"></div>
            <div class="h-72 rounded-[3rem] bg-white/60 animate-pulse border-2 border-white shadow-xl" style="animation-delay:0.2s;"></div>
        </div>

        <!-- CTA a tienda completa -->
        <div class="text-center">
            <a href="store.html" class="inline-flex items-center gap-2 bg-slate-900 text-white px-8 py-4 rounded-full font-black uppercase tracking-widest text-sm hover:bg-amber-600 transition-all shadow-xl">
                Ver tienda completa
                <i data-lucide="arrow-right" class="h-4 w-4"></i>
            </a>
        </div>

    </section>

    <!-- FOOTER -->
    <footer class="p-8 text-center">
        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">© 2026 TipoVisual • Raíces que conectan</p>
    </footer>

    <script>
        // ── Inicializar Lucide al cargar ──
        window.addEventListener('load', () => {
            lucide.createIcons();
            initNav();
            loadStoreProducts();
            applyEditionStates();
        });

        // ── Ediciones activas ──────────────────────────────────────────
        const savedEditions = JSON.parse(localStorage.getItem('tipoVisual_editions'));

        function applyEditionStates() {
            if (!savedEditions) return;
            savedEditions.forEach(edition => {
                if (!edition.active) {
                    const btn = document.getElementById(`btn-${edition.id}`);
                    if (btn) {
                        btn.style.opacity = '0.5';
                        btn.style.cursor  = 'not-allowed';
                        const p = btn.querySelector('p');
                        if (p) p.innerText = 'Edición no disponible';
                    }
                }
            });
        }

        function play(editionId) {
            if (savedEditions) {
                const edition = savedEditions.find(e => e.id === editionId);
                if (edition && !edition.active) {
                    alert('Esta edición está temporalmente fuera de servicio.');
                    return;
                }
            }
            localStorage.setItem('selectedEdition', editionId);
            window.location.href = 'game.html';
        }

        // ── Nav dinámico ──────────────────────────────────────────────
        async function initNav() {
            const session = await getSession();
            const navEl   = document.getElementById('user-nav');

            if (session) {
                const profile     = await getUserProfile();
                const displayName = profile?.name || session.user.email;
                const isAdmin     = profile?.role === 'admin';
                navEl.innerHTML = `
                    ${isAdmin ? `<a href="dashboard.html" class="text-xs font-black text-slate-400 hover:text-amber-600 uppercase tracking-widest transition flex items-center gap-1"><i data-lucide="settings" class="h-4 w-4"></i> Admin</a>` : ''}
                    <a href="profile.html" class="flex items-center gap-2 bg-white border border-slate-200 px-3 py-1.5 rounded-full shadow-sm hover:border-amber-300 transition">
                        <div class="w-6 h-6 rounded-full bg-amber-500 flex items-center justify-center text-white text-[10px] font-black">${displayName.slice(0,1).toUpperCase()}</div>
                        <span class="text-sm font-medium text-slate-700">${displayName.split(' ')[0]}</span>
                    </a>
                `;
            } else {
                navEl.innerHTML = `
                    <a href="store.html" class="text-sm font-black uppercase tracking-widest text-slate-400 hover:text-amber-600 transition hidden md:block">Tienda</a>
                    <a href="login.html" class="bg-slate-900 text-white text-sm font-black px-4 py-2 rounded-full hover:bg-amber-600 transition uppercase tracking-widest">Ingresar</a>
                    <button onclick="checkAdminAccess()" class="text-slate-400 hover:text-amber-600 transition" title="Acceso admin">
                        <i data-lucide="settings" class="h-5 w-5"></i>
                    </button>
                `;
            }
            lucide.createIcons();
        }

        async function checkAdminAccess() {
            const profile = await getUserProfile();
            window.location.href = profile?.role === 'admin' ? 'dashboard.html' : 'login.html?reason=admin';
        }

        // ── Cargar productos desde Supabase ───────────────────────────
        async function loadStoreProducts() {
            const { data, error } = await supabaseClient
                .from('products')
                .select('*')
                .eq('active', true)
                .order('created_at')
                .limit(3); // Solo mostramos 3 en el index

            const section = document.getElementById('store-section');
            const grid    = document.getElementById('store-products-grid');

            if (error || !data || data.length === 0) {
                // Si no hay productos, ocultamos la sección completamente
                section.classList.add('hidden');
                return;
            }

            // Mostrar sección
            section.classList.remove('hidden');
            grid.innerHTML = '';

            data.forEach((product, i) => {
                const isCombo    = product.edition === 'combo';
                const outOfStock = product.stock === 0;
                const delay      = i * 0.1;

                const card = document.createElement('a');
                card.href      = 'store.html';
                card.className = `group relative bg-white p-8 rounded-[3rem] shadow-xl hover:shadow-amber-200 transition-all border-2 border-transparent hover:border-amber-500 overflow-hidden flex flex-col fade-up`;
                card.style.animationDelay = `${delay}s`;

                card.innerHTML = `
                    ${isCombo ? `<span class="absolute top-5 left-5 bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest z-10">⭐ Pack</span>` : ''}
                    ${outOfStock ? `<span class="absolute top-5 right-5 bg-slate-100 text-slate-400 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest z-10">Agotado</span>` : ''}

                    <!-- Imagen -->
                    <div class="flex items-center justify-center h-32 mb-5">
                        <img src="${product.image_url || ''}"
                             class="max-h-full max-w-full object-contain drop-shadow-lg float-animation group-hover:scale-110 transition-transform duration-500"
                             style="animation-delay:${delay + 0.3}s;"
                             onerror="this.outerHTML='<span class=\'text-5xl float-animation\'>📦</span>'">
                    </div>

                    <!-- Info -->
                    <h3 class="text-xl font-black text-slate-900 uppercase tracking-tighter leading-tight mb-1">${product.name}</h3>
                    <p class="text-slate-500 font-medium text-sm flex-1 mb-4">${product.description ? product.description.slice(0, 80) + '...' : ''}</p>

                    <!-- Precio + CTA -->
                    <div class="flex items-center justify-between mt-auto">
                        <span class="text-2xl font-black text-amber-600">$${parseFloat(product.price).toFixed(2)}</span>
                        <span class="flex items-center gap-1 text-xs font-black uppercase tracking-widest text-amber-600 group-hover:translate-x-1 transition-transform">
                            Comprar <i data-lucide="arrow-right" class="h-3.5 w-3.5"></i>
                        </span>
                    </div>

                    <!-- Fondo decorativo -->
                    <div class="absolute -bottom-8 -right-8 text-slate-50 opacity-10 group-hover:opacity-20 transition-opacity pointer-events-none">
                        <i data-lucide="package" class="h-32 w-32"></i>
                    </div>
                `;
                grid.appendChild(card);
            });

            lucide.createIcons();
        }
    </script>
</body>
</html>
